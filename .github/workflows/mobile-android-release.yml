name: 赛博包工头 Android 发布

# Android 与 iOS 分开发布，避免 App Store 审核阻塞 Android 产物。
on:
  push:
    tags:
      - 'mobile-android-v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: '可选：精确指定移动端版本，例如 0.0.22'
        required: false
        type: string
      publish_github_release:
        description: '创建或更新 mobile-android-v<version> GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  android-build:
    runs-on: ubuntu-latest

    # 创建 GitHub Release 需要默认 GITHUB_TOKEN 具备 contents:write。
    permissions:
      contents: write

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 配置 pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 解析发布版本和版本号
        id: release
        env:
          MOBILE_ANDROID_RELEASE_VERSION: ${{ github.event.inputs.release_version }}
          MOBILE_ANDROID_PUBLISH_RELEASE: ${{ github.event.inputs.publish_github_release }}
        run: node scripts/prepare-android-release.mjs

      - name: 配置 JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: 生成 Expo Android 工程
        run: npx expo prebuild --platform android --no-install

      - name: 构建 Android Release APK
        run: cd android && ./gradlew assembleRelease

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v7
        with:
          name: sbbgt-mobile-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk

      - name: 确保 GitHub Release 标签存在
        if: steps.release.outputs.publish_release == 'true' && !startsWith(github.ref, 'refs/tags/mobile-android-v')
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 0
          fi

          git tag "$tag" "$GITHUB_SHA"
          git push origin "refs/tags/$tag"

      - name: 创建 GitHub Release
        if: steps.release.outputs.publish_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber \
              android/app/build/outputs/apk/release/*.apk
          else
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "赛博包工头 Android $tag" \
              --prerelease \
              --latest=false \
              --generate-notes \
              android/app/build/outputs/apk/release/*.apk
          fi
