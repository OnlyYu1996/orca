name: Homebrew Cask Bump

# 保持当前仓库的 Cask 模板与 GitHub Releases 同步。
# 触发方式：
#   - workflow_call：release-cut.yml 完成稳定版发布
#   - workflow_dispatch：手动回填指定标签
#
# 此任务计算 sbbgt-macos-arm64.dmg 和 sbbgt-macos-x64.dmg 的 sha256，
# 更新当前仓库对应渠道的 Cask 版本与哈希后直接提交。稳定标签更新
# Casks/orca.rb，RC 标签更新 Casks/orca@rc.rb。
#
# 不使用 release.published，因为移动端也会创建 Release；由桌面发布流水线显式调用，
# 可避免从非桌面 Release 下载 sbbgt-macos-*.dmg 并误写 Cask。

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to sync (e.g. v1.3.25)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync (e.g. v1.3.25)
        required: true
        type: string

jobs:
  bump-cask:
    runs-on: ubuntu-latest
    # Why: only desktop tags have the macOS DMGs this workflow downloads.
    # A mobile tag such as `mobile-v0.0.1` must never rewrite either cask.
    if: >
      inputs.tag != '' &&
      startsWith(inputs.tag, 'v')
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: Resolve tag and version
        id: tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_TAG" ]]; then
            tag="$INPUT_TAG"
          else
            tag="$RELEASE_TAG"
          fi
          version="${tag#v}"
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Resolve cask target
        id: cask
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            token="orca@rc"
            branch_token="orca-rc"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            token="orca"
            branch_token="orca"
          else
            echo "::error::Unsupported desktop tag shape: $TAG" >&2
            exit 1
          fi

          path="Casks/${token}.rb"
          if [[ ! -f "$path" ]]; then
            echo "::error::Missing cask template: $path" >&2
            exit 1
          fi

          echo "token=$token" >>"$GITHUB_OUTPUT"
          echo "path=$path" >>"$GITHUB_OUTPUT"
          echo "branch=bump/${branch_token}-${VERSION}" >>"$GITHUB_OUTPUT"
          echo "title=${token} ${VERSION}" >>"$GITHUB_OUTPUT"

      - name: Download DMGs and compute sha256
        id: hash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dmgs
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'sbbgt-macos-arm64.dmg' \
            --pattern 'sbbgt-macos-x64.dmg' \
            --dir dmgs
          arm=$(sha256sum dmgs/sbbgt-macos-arm64.dmg | awk '{print $1}')
          intel=$(sha256sum dmgs/sbbgt-macos-x64.dmg  | awk '{print $1}')
          echo "arm=$arm"     >>"$GITHUB_OUTPUT"
          echo "intel=$intel" >>"$GITHUB_OUTPUT"

      - name: Render updated cask file
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          ARM_SHA: ${{ steps.hash.outputs.arm }}
          INTEL_SHA: ${{ steps.hash.outputs.intel }}
          CASK_PATH: ${{ steps.cask.outputs.path }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, re, pathlib
          p = pathlib.Path(os.environ["CASK_PATH"])
          src = p.read_text()
          src = re.sub(r'version "[^"]+"',
                       f'version "{os.environ["VERSION"]}"', src, count=1)
          src = re.sub(r'sha256 arm:\s*"[0-9a-f]+",\s*\n\s*intel:\s*"[0-9a-f]+"',
                       'sha256 arm:   "{arm}",\n         intel: "{intel}"'.format(
                           arm=os.environ["ARM_SHA"],
                           intel=os.environ["INTEL_SHA"]),
                       src, count=1)
          p.write_text(src)
          print(src)
          PY

      - name: Commit updated cask
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          TAG: ${{ steps.tag.outputs.tag }}
          CASK_PATH: ${{ steps.cask.outputs.path }}
          TITLE: ${{ steps.cask.outputs.title }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Cask already up-to-date for $TAG; nothing to do."
            exit 0
          fi

          git add "$CASK_PATH"
          git commit -m "chore(homebrew): $TITLE"
          git push origin HEAD:main
